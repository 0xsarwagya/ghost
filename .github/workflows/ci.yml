name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check-types
      - run: pnpm test
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        # Each matrix cell maps 1:1 to a Playwright project. Splitting them
        # keeps honest per-browser results visible in the checks UI. The
        # identity projects are the persistence lab — the release gate.
        project:
          - chromium-identity
          - firefox-identity
          - webkit-identity
          - chromium-protocol
          - firefox-protocol
          - webkit-protocol
          - chromium-unsupported
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers + OS deps
        run: pnpm exec playwright install --with-deps
      - name: Run ${{ matrix.project }}
        run: pnpm exec playwright test --project=${{ matrix.project }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          retention-days: 7
